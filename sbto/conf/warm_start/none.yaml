# Start from solver state in <rundir>
rundir: ""
# Add value on the diagonal of the cov after warm starting
add_cov_diag: 0.
# Iterations of warm start (if 0, same number as in solver config)
N_it: 0
# Warm start with multiple shooting (shooting nodes from referece)
multiple_shooting: false
# Warm start with incremental optimization of the knots
incremental: false
# Max number of iterations per increment
N_max_incr: 0
# Minimum value of the diag covariance to increment the number of var to opt
min_std_next: 0.
# Minimum value of the diag covariance when all knots are optimized
min_std_final: 0.
# Copy best samples from the warm start solution when initializing the solver state
cp_best: false
# Randomize the knots time
rand_t_knots: 0