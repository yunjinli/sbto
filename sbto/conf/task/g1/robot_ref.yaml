defaults:
  - g1/mj_scene_ref@mj_scene_ref: no_object.yaml
  - g1/sim@sim: default.yaml
  - g1/sim/mj_scene@sim.mj_scene: no_object.yaml
  - g1/cfg_ref@cfg_ref: default.yaml
  - _self_

_target_: sbto.tasks.g1.robot_ref.G1RobotRef

cfg:
  _target_: sbto.tasks.g1.robot_ref.ConfigG1RobotRef

  # --- State costs ---
  joint_pos_weight: 0.25
  joint_vel_weight: 0.01
  base_pos_weight: 5.0
  base_quat_weight: 1.

  # --- Torso pose/vel ---
  torso_pos_weight: 30.0
  torso_quat_weight: 3.
  torso_quat_weight_terminal: 3.
  torso_linvel_weight: 0.3
  torso_angvel_weight: 0.1

  # --- Foot pose cost ---
  foot_position: 10.0
  foot_orientation: 0.

  # --- Feet Contact cost ---
  contact_feet_weight: 0.
  contact_force_feet_weight: 1.0e-6

  # --- Hand pose cost ---
  # (both in world and obj ref frame)
  hand_position: 5.

  self_collision: 1.0