
_target_: sbto.sim.scene_mj.MjScene
cfg:
  _target_: sbto.sim.scene_mj.ConfigMjScene
  xml_scene_path: sbto/models/unitree_g1/scene_mjx_29dof_no_hands.xml
  xml_sensors_path:
  - sbto/models/unitree_g1/sensors/feet_contact.xml
  - sbto/models/unitree_g1/sensors/feet_pos.xml
  - sbto/models/unitree_g1/sensors/hands_pos.xml
  - sbto/models/unitree_g1/sensors/obj_collision.xml
  - sbto/models/unitree_g1/sensors/obj.xml
  - sbto/models/unitree_g1/sensors/torso.xml
  xml_contact_pairs_path:
  - sbto/models/unitree_g1/contact_pairs/reduced.xml
  - sbto/models/unitree_g1/contact_pairs/robot_obj_collision.xml
  - sbto/models/unitree_g1/contact_pairs/robot_obj.xml
  add_body:

    empty_body:
      type: body_only
      pos: [0.4, 0.0, 0.1]
      euler: [0., 0., 0.]

    obj:
      type: box
      pos: [0., 0., 0.0105]
      size: [0.155, 0.155, 0.17] # Using a larger box to detect hand contact
      euler: [3.05, 0.11, 1.11]
      mass: 0.6
      rgba: [0.3, 0.3, 0.3, 1.0]
      freejoint: true
      bodyname: empty_body
      group: 1
      priority: 1
      condim: 3
      contype: 0
      conaffinity: 1
      margin: 0.04 # Margin to detect floor contact
      gap: 0.
      solref: [0.04, 1.]
      solmix: 3.
      friction: [0.7, 0.005, 0.0001]