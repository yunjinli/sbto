[workspace]
channels = ["conda-forge"]
name = "sbto"
platforms = ["linux-64"]
version = "0.1.0"

[dependencies]
python = "3.12.*"

[pypi-dependencies]
mujoco = "==3.3.7"
numba = "==0.62.1"
scipy = "==1.16.2"
matplotlib = "==3.10.6"
pyyaml = "==6.0.3"
hydra-core = "==1.3.2"
seaborn = "==0.13.2"
opencv-python = ">=4.13.0.92, <5"
sbto = { path = ".", editable = true }

[tasks]

install-datasets = { cmd = "mkdir datasets; cd datasets; wget https://huggingface.co/datasets/omniretarget/OmniRetarget_Dataset/resolve/main/robot-object.zip; unzip robot-object.zip" }
